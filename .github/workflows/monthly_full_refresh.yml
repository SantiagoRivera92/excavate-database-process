name: Monthly Full Refresh

on:
  schedule:
    - cron: '0 0 1 * *'  # Runs on the 1st of every month at midnight
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: Excavate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache MediaWiki gallery data
      uses: actions/cache@v4
      with:
        path: mediawiki_cache/
        key: mediawiki-cache-${{ hashFiles('data/input/arts.json') }}
        restore-keys: |
          mediawiki-cache-

    - name: Run monthly full refresh
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        S3_API_URL: ${{ secrets.S3_API_URL }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
        S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      run: |
        python monthly_full_refresh.py
