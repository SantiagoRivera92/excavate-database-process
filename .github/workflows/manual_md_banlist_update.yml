name: Manual MD Banlist Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: Excavate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Master Duel banlists
      run: |
        python src/generate_md_banlists.py

    - name: Commit and push banlist changes
      run: |
        git add data/formats_md/
        if git diff --cached --quiet; then
          echo "No banlist changes to commit"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Master Duel banlists"
          git push
        fi

    - name: Run nightly data processor
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        S3_API_URL: ${{ secrets.S3_API_URL }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
        S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        python src/nightly_data_processor.py
