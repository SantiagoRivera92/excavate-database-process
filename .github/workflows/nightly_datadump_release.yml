name: Nightly Data Dump Release

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Excavate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate datadump.json
      id: dump
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        echo "TAG=1.0.$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
        python generate_datadump.py

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.dump.outputs.TAG }}
        name: Nightly Data Dump ${{ steps.dump.outputs.TAG }}
        body: Automated nightly data dump of the Cards table from the Excavate database.
        files: datadump.json

    - name: Commit README update
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git diff --cached --quiet || git commit -m "Update README with latest dump link"
        git push
