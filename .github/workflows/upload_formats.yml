name: Upload Formats to MongoDB

on:
  push:
    paths:
      - 'data/input/formats.json'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    environment: Excavate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymongo

    - name: Upload formats to MongoDB
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python upload_formats.py
